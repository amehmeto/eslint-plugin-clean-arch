# Hecate (Ἑκάτη) - Goddess of crossroads in Greek mythology
# https://www.wikiwand.com/en/articles/Hecate
#
# This workflow observes file changes and routes them to the right destination.
# It stands at the crossroads of the CI pipeline, directing each change
# to its proper path.

name: Hecate

on:
  workflow_call:
    outputs:
      app-changed:
        description: 'Whether source or test files have changed'
        value: ${{ jobs.check-paths.outputs.app-changed }}
      docs-only:
        description: 'Whether only docs/config files have changed (no src or tests)'
        value: ${{ jobs.check-paths.outputs.docs-only }}

jobs:
  check-paths:
    runs-on: ubuntu-latest
    outputs:
      app-changed: ${{ steps.filter.outputs.src == 'true' || steps.filter.outputs.tests == 'true' || steps.filter.outputs.config == 'true' }}
      docs-only: ${{ steps.filter.outputs.docs == 'true' && steps.filter.outputs.src != 'true' && steps.filter.outputs.tests != 'true' && steps.filter.outputs.config != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: .github/path-filters.yml
